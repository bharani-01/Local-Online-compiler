<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Online Python Compiler (Server-Side)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Merriweather:wght@400;700&family=Fira+Code:wght@400;700&display=swap" rel="stylesheet">
    
    <!-- CodeMirror CSS -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.2/codemirror.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.2/theme/default.min.css"> 

    <style>
        body {
            font-family: 'Merriweather', serif;
        }
        .CodeMirror {
            height: 100%;
            font-family: 'Fira Code', monospace;
            font-size: 0.9rem;
            line-height: 1.5;
            border-top: none;
            background-color: #f8fafc;
        }
        .CodeMirror-gutters {
            background-color: #f1f5f9;
            border-right: 1px solid #e2e8f0;
        }
        
        /* Custom scrollbar styling for a classic look */
        ::-webkit-scrollbar {
            width: 12px;
            background-color: #f1f5e9;
        }
        ::-webkit-scrollbar-thumb {
            background-color: #cbd5e1;
            border: 3px solid #f1f5e9;
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background-color: #94a3b8;
        }

        /* Loading animation for server execution */
        .loader {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #1e40af;
            border-radius: 50%;
            width: 24px;
            height: 24px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        /* Styles for different output types */
        .output-error {
            color: #dc2626; /* red-600 */
            font-weight: bold;
        }
        .output-info {
            color: #6b7280; /* gray-500 */
            font-style: italic;
        }
        .output-normal {
            color: #1f2937; /* gray-900 */
        }
    </style>
</head>
<body class="bg-gray-100 text-gray-900 flex flex-col h-screen">

    <!-- Skip to main content link for accessibility -->
    <a href="#main-content" class="absolute top-0 left-0 -translate-y-full focus:translate-y-0 text-blue-700 font-bold p-2 transition-transform duration-300">Skip to main content</a>

    <!-- Header with classic, professional style -->
    <header class="bg-white border-b border-gray-300 shadow-sm">
        <div class="container mx-auto px-6 py-4 flex justify-between items-center">
            <div class="flex-shrink-0">
                <h1 class="text-2xl font-bold text-blue-700">Online Python Compiler (Server-Side)</h1>
                <p class="text-gray-600">Write your Python code and see the output instantly (server-executed).</p>
            </div>
            <!-- Loading indicator for server execution -->
            <div id="statusArea" class="flex items-center text-sm font-semibold">
                <div id="loadingIndicator" class="loader mr-2 hidden" role="status" aria-label="Executing Python code"></div>
                <span id="statusText">Ready</span>
            </div>
        </div>
    </header>

    <main id="main-content" class="flex-grow container mx-auto px-6 py-8 flex flex-col md:flex-row gap-6">
        
        <!-- Code Editor Section -->
        <div class="w-full md:w-2/3 flex flex-col">
            <div class="flex-grow flex flex-col bg-white border border-gray-300">
                <div class="bg-gray-200 px-4 py-2 border-b border-gray-300 flex justify-between items-center">
                    <h2 class="text-lg font-semibold text-gray-800">Code Editor</h2>
                    <button id="runButton" class="bg-blue-700 hover:bg-blue-800 text-white font-bold py-2 px-4 rounded transition duration-300 ease-in-out disabled:opacity-50 disabled:cursor-not-allowed" aria-label="Run Code (Ctrl + Enter)">
                        <span id="runButtonText">▶ Run</span>
                    </button>
                </div>
                <div class="flex-grow p-1 code-editor-wrapper"> 
                     <textarea id="codeInput" class="w-full h-full bg-white text-gray-800 p-4 resize-none focus:outline-none font-mono text-sm" placeholder="print('Hello, World!')"></textarea>
                </div>
            </div>
        </div>

        <!-- Output and Input Section -->
        <div class="w-full md:w-1/3 flex flex-col">
            <div class="flex-grow flex flex-col bg-white border border-gray-300">
                <div class="bg-gray-200 px-4 py-2 border-b border-gray-300 flex justify-between items-center">
                    <h2 class="text-lg font-semibold text-gray-800">Output</h2>
                    <button id="clearOutputButton" class="bg-gray-300 hover:bg-gray-400 text-gray-800 font-bold py-1 px-3 text-sm rounded transition duration-300 ease-in-out" aria-label="Clear Output">
                        Clear
                    </button>
                </div>
                <div id="outputContainer" class="flex-grow p-4 overflow-y-auto" aria-live="polite" aria-atomic="true">
                    <pre id="output" class="text-sm output-info whitespace-pre-wrap">Output will appear here.</pre>
                </div>
                <!-- Input Container is now for pre-defined input -->
                <div id="inputContainer" class="p-4 border-t border-gray-300">
                    <label for="predefinedInput" class="text-sm font-semibold mb-2 block">Program Inputs (one per line):</label>
                    <textarea id="predefinedInput" class="w-full h-24 p-2 border border-gray-300 bg-gray-50 text-gray-900 focus:outline-none focus:border-blue-500 rounded" placeholder="Enter inputs here (e.g., your name, then your age on separate lines)..."></textarea>
                </div>
            </div>
        </div>
    </main>

    <!-- CodeMirror JS -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.2/codemirror.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.2/mode/python/python.min.js"></script>
    <script>
        // --- DOM Element References ---
        const codeInput = document.getElementById('codeInput');
        const runButton = document.getElementById('runButton');
        const runButtonText = document.getElementById('runButtonText');
        const outputElement = document.getElementById('output');
        const loadingIndicator = document.getElementById('loadingIndicator');
        const statusText = document.getElementById('statusText');
        const clearOutputButton = document.getElementById('clearOutputButton');
        const inputContainer = document.getElementById('inputContainer'); // Now refers to pre-defined input container
        const predefinedInput = document.getElementById('predefinedInput'); // New reference for the textarea

        // --- CodeMirror Initialization ---
        const editor = CodeMirror.fromTextArea(codeInput, {
            mode: { name: "python", version: 3, singleLineStringErrors: false },
            theme: "default",
            lineNumbers: true,
            indentUnit: 4,
            tabSize: 4,
            indentWithTabs: false,
            electricChars: true,
            matchBrackets: true,
            autofocus: true,
            gutters: ["CodeMirror-linenumbers"],
            lineWrapping: true,
        });

        // Set editor size to fill its container
        editor.setSize("100%", "100%");

        // --- Local Storage for Code Persistence ---
        const LOCAL_STORAGE_CODE_KEY = 'onlinePythonCompilerCode_server'; // Changed key to avoid conflict
        const LOCAL_STORAGE_INPUT_KEY = 'onlinePythonCompilerInput_server';

        function loadCodeAndInputFromLocalStorage() {
            const savedCode = localStorage.getItem(LOCAL_STORAGE_CODE_KEY);
            const savedInput = localStorage.getItem(LOCAL_STORAGE_INPUT_KEY);

            if (savedCode) {
                editor.setValue(savedCode);
            } else {
                editor.setValue("name = input('Please enter your name: ')\nprint(f'Hello, {name}!')\n\n# Press Ctrl + Enter to run the code.");
            }
            if (savedInput) {
                predefinedInput.value = savedInput;
            } else {
                predefinedInput.value = "John Doe\n42"; // Example default input
            }
        }

        function saveCodeAndInputToLocalStorage() {
            localStorage.setItem(LOCAL_STORAGE_CODE_KEY, editor.getValue());
            localStorage.setItem(LOCAL_STORAGE_INPUT_KEY, predefinedInput.value);
        }

        editor.on('change', saveCodeAndInputToLocalStorage);
        predefinedInput.addEventListener('input', saveCodeAndInputToLocalStorage);


        // --- Helper Functions ---
        function appendOutput(text, type = 'normal', replaceContent = false) {
            const currentContent = outputElement.textContent.trim();
            const textToAppend = String(text); 
            
            if (replaceContent || currentContent === 'Output will appear here.' || currentContent === 'Running...' || currentContent === 'Output cleared.') {
                outputElement.textContent = textToAppend;
            } else {
                if (outputElement.textContent.length > 0 && !outputElement.textContent.endsWith('\n') && !textToAppend.startsWith('\n')) {
                    outputElement.textContent += '\n' + textToAppend;
                } else {
                    outputElement.textContent += textToAppend;
                }
            }
            outputElement.classList.remove('output-normal', 'output-error', 'output-info');
            outputElement.classList.add(`output-${type}`);
            outputElement.scrollTop = outputElement.scrollHeight; 
        }

        function clearOutput() {
            appendOutput('Output cleared.', 'info', true);
        }

        // --- Server-Side Code Execution Logic ---
        async function runPythonCode() {
            console.log("runPythonCode: Starting server execution.");
            
            const code = editor.getValue();
            const stdin = predefinedInput.value; // Get all inputs from the textarea

            if (!code.trim()) {
                appendOutput("No code provided to execute on the server.", 'info', true);
                return;
            }

            // UI feedback
            runButton.disabled = true;
            loadingIndicator.classList.remove('hidden');
            statusText.textContent = 'Executing...';
            runButtonText.textContent = 'Running...';
            clearOutput();
            appendOutput("Sending code to server for execution...", 'info');

            try {
                const response = await fetch('/run', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ code: code, stdin: stdin }), // Send code and stdin
                });

                const result = await response.json();

                if (response.ok) {
                    if (result.output) {
                        appendOutput(result.output, 'normal', true); // Replace with full output
                    } else {
                        appendOutput("Execution completed with no output.", 'info', true);
                    }
                } else {
                    console.error("Server error:", result.error);
                    appendOutput(`Server Error:\n${result.error || 'Unknown server error.'}`, 'error', true);
                }
            } catch (error) {
                console.error("Network or unexpected client error:", error);
                appendOutput(`Network or Client Error:\n${error.message || error}`, 'error', true);
            } finally {
                // Restore UI state
                runButton.disabled = false;
                loadingIndicator.classList.add('hidden');
                statusText.textContent = 'Ready';
                runButtonText.textContent = '▶ Run';
                console.log("runPythonCode: Server execution finished. UI restored.");
            }
        }

        // --- Event Listeners ---
        runButton.addEventListener('click', runPythonCode);
        clearOutputButton.addEventListener('click', clearOutput);

        // Keyboard shortcut for running code (Ctrl/Cmd + Enter)
        editor.on('keydown', (cm, event) => {
            if ((event.ctrlKey || event.metaKey) && event.key === 'Enter' && !runButton.disabled) {
                event.preventDefault(); // Prevent new line in editor
                runPythonCode();
            }
        });

        // --- Initial Setup on Page Load ---
        window.addEventListener('load', () => {
            loadCodeAndInputFromLocalStorage();
        });
    </script>
</body>
</html>
